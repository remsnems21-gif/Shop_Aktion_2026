<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shop-Aktion 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent}
button,select{font-family:inherit;cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{max-height:0;opacity:0}to{max-height:2000px;opacity:1}}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.spinner{width:44px;height:44px;border:4px solid #1e293b;border-top:4px solid #3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}

/* Header */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#1d4ed8 50%,#7c3aed 100%);padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.4)}
.header-inner{max-width:720px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header-left{display:flex;align-items:center;gap:8px}
.logo{width:32px;height:32px;background:rgba(255,255,255,.15);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
.header-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:6px}
.quiz-btn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;text-decoration:none;white-space:nowrap}
.quiz-btn:hover{background:rgba(255,255,255,.22)}
.lang-toggle{display:flex;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.25)}
.lang-btn{padding:5px 10px;border:none;font-size:11px;font-weight:400;background:transparent;color:rgba(255,255,255,.6)}
.lang-btn.active{font-weight:700;background:#fff;color:#1d4ed8}

/* Nav */
.nav{max-width:720px;margin:0 auto;padding:10px 16px 0;display:flex;gap:3px}
.nav-btn{flex:1;padding:10px 4px;border:none;border-radius:9px 9px 0 0;font-size:12px;font-weight:500;color:#64748b;background:#0f172a;border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.nav-btn.active{font-weight:700;color:#3b82f6;background:#1e293b;border-bottom-color:#3b82f6}
.badge{background:#ef4444;color:#fff;border-radius:99px;padding:1px 6px;font-size:9px;font-weight:700}

.main{max-width:720px;margin:0 auto;padding:14px}

/* Error */
.error-banner{background:#451a03;border:1px solid #92400e;color:#fbbf24;padding:10px;border-radius:9px;margin-bottom:14px;font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.retry-btn{background:#92400e;color:#fbbf24;border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600}

/* Progress */
.progress-card{background:#1e293b;border-radius:13px;padding:18px;margin-bottom:12px;border:1px solid #334155}
.progress-header{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label{font-weight:700;font-size:14px}
.progress-meta{font-size:12px;color:#94a3b8}
.progress-track{background:#334155;border-radius:99px;height:14px;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#22c55e,#10b981);height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.progress-pct{text-align:right;font-size:24px;font-weight:800;color:#22c55e;margin-top:6px}

/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:#1e293b;border-radius:11px;padding:14px 10px;border:1px solid #334155}
.stat-num{font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:10px;color:#94a3b8;margin-top:3px;font-weight:500}

.section-title{font-size:13px;font-weight:700;margin-bottom:8px}
.filters{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.filter-select{flex:1;min-width:90px;padding:8px;border-radius:9px;border:1px solid #334155;font-size:11px;background:#1e293b;color:#e2e8f0;font-weight:500}

/* Route Card */
.route-card{background:#1e293b;border-radius:11px;margin-bottom:8px;border:1px solid #334155;overflow:hidden;animation:fadeIn .3s ease}
.route-card.overdue-border{border-color:#92400e}
.route-header{padding:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.route-header:active{background:rgba(255,255,255,.03)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-region{font-weight:700;font-size:13px;color:#f1f5f9}
.card-meta{font-size:10px;color:#64748b;display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin-top:2px}
.today-badge{background:#3b82f6;color:#fff;padding:1px 5px;border-radius:99px;font-size:8px;font-weight:700}
.overdue-badge{background:#92400e;color:#fbbf24;padding:1px 5px;border-radius:99px;font-size:8px;font-weight:700}
.status-pill{color:#fff;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0}
.route-progress{display:flex;align-items:center;gap:8px;margin-top:6px}
.route-progress-track{flex:1;background:#334155;border-radius:99px;height:6px;overflow:hidden}
.route-progress-fill{height:100%;border-radius:99px;transition:width .5s ease}
.route-progress-text{font-size:10px;color:#94a3b8;font-weight:600;white-space:nowrap}
.card-detail{font-size:11px;color:#94a3b8;margin-bottom:2px;padding:0 12px}
.card-detail span{color:#64748b}
.expand-icon{font-size:11px;color:#64748b;transition:transform .2s}
.expand-icon.open{transform:rotate(180deg)}

/* Shop Items */
.shops-list{border-top:1px solid #334155;background:#162032}
.shop-item{padding:10px 12px;border-bottom:1px solid rgba(51,65,85,.5);display:flex;align-items:center;gap:10px;animation:fadeIn .2s ease}
.shop-item:last-child{border-bottom:none}
.shop-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.shop-info{flex:1;min-width:0}
.shop-name{font-size:12px;font-weight:600;color:#f1f5f9}
.shop-addr{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shop-extra{font-size:9px;color:#475569;margin-top:1px}
.shop-actions{display:flex;gap:4px;flex-shrink:0}
.btn-sm{padding:6px 10px;border:none;border-radius:7px;font-weight:700;font-size:10px;min-height:32px}
.btn-sm-v{background:#166534;color:#4ade80}
.btn-sm-nv{background:#7f1d1d;color:#fca5a5}
.btn-sm-r{background:#334155;color:#94a3b8}
.btn-sm:active{transform:scale(.97)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#1e293b;border-radius:14px;padding:22px;width:100%;max-width:380px;border:1px solid #334155;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-title{margin:0 0 3px;font-size:15px;font-weight:700}
.modal-sub{color:#94a3b8;margin:0 0 12px;font-size:12px}
.modal textarea{width:100%;padding:10px;border-radius:9px;border:1px solid #334155;font-size:13px;font-family:inherit;background:#0f172a;color:#e2e8f0;resize:vertical;box-sizing:border-box}
.modal-actions{display:flex;gap:6px;margin-top:12px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;border:1px solid #334155;border-radius:8px;background:transparent;color:#94a3b8;font-weight:600;font-size:12px}
.btn-confirm-nv{padding:8px 16px;border:none;border-radius:8px;background:#ef4444;color:#fff;font-weight:700;font-size:12px}

.empty{text-align:center;color:#475569;padding:32px;font-size:13px}
.hidden{display:none}
</style>
</head>
<body>

<div id="loading" class="loading-screen">
  <div class="spinner"></div>
  <p style="color:#94a3b8;font-size:13px" id="loading-text">Verbindung zu Supabase...</p>
</div>

<div id="app" class="hidden">
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">S</div>
        <h1 class="header-title" data-i18n="title">Shop-Aktion 2026</h1>
      </div>
      <div class="header-right">
        <a id="quiz-link" href="#" target="_blank" rel="noopener noreferrer" class="quiz-btn" data-i18n="quiz">Quiz starten →</a>
            <button onclick="loadAll()" class="quiz-btn" id="refresh-btn" title="Refresh">🔄</button>
        <div class="lang-toggle">
          <button class="lang-btn active" onclick="switchLang('de')" id="lang-de">DE</button>
          <button class="lang-btn" onclick="switchLang('fr')" id="lang-fr">FR</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchView('dashboard')" id="nav-dashboard" data-i18n="dashboard">Dashboard</button>
    <button class="nav-btn" onclick="switchView('list')" id="nav-list" data-i18n="list">Routen</button>
    <button class="nav-btn" onclick="switchView('open')" id="nav-open"><span data-i18n="open">Offen</span> <span class="badge" id="open-badge">0</span></button>
  </nav>

  <main class="main">
    <div id="error-box" class="error-banner hidden"><span id="error-text"></span><button class="retry-btn" onclick="loadAll()">Retry</button></div>

    <div id="view-dashboard">
      <div class="progress-card">
        <div class="progress-header">
          <span class="progress-label" data-i18n="progress">Fortschritt</span>
          <span class="progress-meta" id="progress-meta">0 / 98 Shops</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-pct" id="progress-pct">0%</div>
      </div>
      <div class="stats-row">
        <div class="stat-card" style="border-left:4px solid #22c55e"><div class="stat-num" style="color:#22c55e" id="cnt-v">0</div><div class="stat-label" data-i18n="visited">Besucht</div></div>
        <div class="stat-card" style="border-left:4px solid #f59e0b"><div class="stat-num" style="color:#f59e0b" id="cnt-o">0</div><div class="stat-label" data-i18n="openStatus">Offen</div></div>
        <div class="stat-card" style="border-left:4px solid #ef4444"><div class="stat-num" style="color:#ef4444" id="cnt-nv">0</div><div class="stat-label" data-i18n="notVisited">Nicht besucht</div></div>
      </div>
      <div id="today-section" class="hidden"><h3 class="section-title" style="color:#3b82f6">📍 <span data-i18n="today">Heute</span></h3><div id="today-cards"></div></div>
      <div id="overdue-section" class="hidden"><h3 class="section-title" style="color:#ef4444">⚠️ <span data-i18n="overdue">Überfällig</span></h3><div id="overdue-cards"></div></div>
    </div>

    <div id="view-list" class="hidden">
      <div class="filters">
        <select class="filter-select" id="f-region" onchange="renderList()"></select>
        <select class="filter-select" id="f-status" onchange="renderList()"></select>
        <select class="filter-select" id="f-member" onchange="renderList()"></select>
      </div>
      <div id="list-cards"></div>
    </div>

    <div id="view-open" class="hidden">
      <div class="filters">
        <select class="filter-select" id="fo-region" onchange="renderOpen()"></select>
      </div>
      <div id="open-cards"></div>
    </div>
  </main>
</div>

<div id="modal-overlay" class="overlay hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title" id="modal-title"></h3>
    <p class="modal-sub" data-i18n="comment">Kommentar / Begründung</p>
    <textarea id="modal-comment" rows="3"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()" data-i18n="cancel">Abbrechen</button>
      <button class="btn-confirm-nv" onclick="confirmNotVisited()" data-i18n="save">Speichern</button>
    </div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const SB = "https://axhuownywlrhmvfyvdwl.supabase.co";
const SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4aHVvd255d2xyaG12Znl2ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MjkxNDEsImV4cCI6MjA5MTIwNTE0MX0.cZWtrmx23fVrqYNzMh7vgzKCg4RTvMHyixsvIa6Z0RQ";
const QUIZ_URL = "https://forms.office.com"; // ← Quiz-Link hier
const H = {"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=representation"};

// ========== i18n ==========
const T={
  de:{title:"Shop-Aktion 2026",dashboard:"Dashboard",list:"Routen",open:"Offen",visited:"Besucht",notVisited:"Nicht besucht",openStatus:"Offen",progress:"Fortschritt",of:"/",shops:"Shops",route:"Route",team:"Team",markVisited:"✓",markNotVisited:"✗",reset:"↩",comment:"Kommentar / Begründung",save:"Speichern",cancel:"Abbrechen",quiz:"Quiz →",filterRegion:"Alle Gebiete",filterStatus:"Alle Status",filterMember:"Alle Mitglieder",goodies:"Goodies",overdue:"Überfällig",today:"Heute",noShops:"Keine Shops",error:"Verbindungsfehler",ma:"MA",emergency:"Notfall",addr:"Adresse",expand:"Details",allVisited:"Alle besucht ✓",markAll:"Alle besucht ✓"},
  fr:{title:"Action Shop 2026",dashboard:"Tableau de bord",list:"Routes",open:"Ouverts",visited:"Visité",notVisited:"Non visité",openStatus:"Ouvert",progress:"Progrès",of:"/",shops:"Shops",route:"Itinéraire",team:"Équipe",markVisited:"✓",markNotVisited:"✗",reset:"↩",comment:"Commentaire / Raison",save:"Enregistrer",cancel:"Annuler",quiz:"Quiz →",filterRegion:"Toutes les régions",filterStatus:"Tous les statuts",filterMember:"Tous les membres",goodies:"Goodies",overdue:"En retard",today:"Aujourd'hui",noShops:"Aucun shop",error:"Erreur de connexion",ma:"Employés",emergency:"Urgence",addr:"Adresse",expand:"Détails",allVisited:"Tous visités ✓",markAll:"Tous visités ✓"}
};
const WD={de:{Montag:"Mo",Dienstag:"Di",Mittwoch:"Mi",Donnerstag:"Do",Freitag:"Fr"},fr:{Montag:"Lu",Dienstag:"Ma",Mittwoch:"Me",Donnerstag:"Je",Freitag:"Ve"}};

let lang=localStorage.getItem("sa-lang")||"de", L=T[lang];
let routes=[], details=[], expanded={}, currentView="dashboard", modalShop=null;

function todayStr(){return new Date().toISOString().slice(0,10)}
function isToday(d){return d===todayStr()}
function isPast(d){return d&&d<todayStr()}
function fmtDate(d){if(!d)return"—";return new Date(d+"T00:00:00").toLocaleDateString("de-CH")}
function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

// ========== LANG ==========
function switchLang(l){
  lang=l;L=T[l];localStorage.setItem("sa-lang",l);
  $("lang-de").className=l==="de"?"lang-btn active":"lang-btn";
  $("lang-fr").className=l==="fr"?"lang-btn active":"lang-btn";
  document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(T[l][k])el.textContent=T[l][k]});
  renderAll();
}

// ========== SUPABASE ==========
async function sbGet(table){
  const r=await fetch(`${SB}/rest/v1/${table}?select=*&order=einsatz_am.asc.nullsfirst,gebiet.asc`,{headers:H});
  if(!r.ok)throw new Error(r.status+": "+await r.text());return r.json();
}
async function sbGetRoutes(){
  const r=await fetch(`${SB}/rest/v1/shops?select=*&order=datum.asc.nullsfirst,gebiet.asc`,{headers:H});
  if(!r.ok)throw new Error(r.status+": "+await r.text());return r.json();
}
async function sbPatch(table,id,data){
  const r=await fetch(`${SB}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(data)});
  if(!r.ok)throw new Error(r.status+": "+await r.text());return r.json();
}

async function loadAll(){
  $("refresh-btn").style.animation="spin .7s linear";
  try{
    const [r,d]=await Promise.all([sbGetRoutes(),sbGet("shop_details")]);
    routes=r;details=d;
    $("error-box").classList.add("hidden");
    $("loading").classList.add("hidden");
    $("app").classList.remove("hidden");
    renderAll();
  }catch(e){
    $("error-text").textContent=L.error+": "+e.message;
    $("error-box").classList.remove("hidden");
    $("loading").classList.add("hidden");
    $("app").classList.remove("hidden");
  }
  setTimeout(()=>{$("refresh-btn").style.animation=""},800);
}

// ========== VIEW ==========
function switchView(v){
  currentView=v;
  ["dashboard","list","open"].forEach(x=>{
    $("view-"+x).classList.toggle("hidden",x!==v);
    $("nav-"+x).classList.toggle("active",x===v);
  });
  if(v==="list"){buildFilters();renderList()}
  if(v==="open"){buildOpenFilters();renderOpen()}
}

// ========== RENDER ==========
function shopsByRoute(route){
  return details.filter(d=>d.gebiet===route.gebiet && d.einsatz_am===(route.datum||route.einsatz_am));
}

function routeStatus(route){
  const s=shopsByRoute(route);
  if(!s.length)return{visited:0,total:0,pct:0,done:false,color:"#f59e0b"};
  const v=s.filter(x=>x.status==="besucht").length;
  const nv=s.filter(x=>x.status==="nicht_besucht").length;
  const pct=Math.round((v/s.length)*100);
  const done=v===s.length;
  const color=done?"#22c55e":nv>0?"#ef4444":"#f59e0b";
  return{visited:v,total:s.length,pct,done,color};
}

function renderAll(){
  const v=details.filter(s=>s.status==="besucht").length;
  const o=details.filter(s=>s.status==="offen").length;
  const nv=details.filter(s=>s.status==="nicht_besucht").length;
  const total=details.length||98;
  const pct=total>0?Math.round((v/total)*100):0;

  $("progress-meta").textContent=`${v} ${L.of} ${total} ${L.shops}`;
  $("progress-fill").style.width=pct+"%";
  $("progress-pct").textContent=pct+"%";
  $("cnt-v").textContent=v;
  $("cnt-o").textContent=o;
  $("cnt-nv").textContent=nv;
  $("open-badge").textContent=o+nv;

  // Today
  const todayRoutes=routes.filter(r=>isToday(r.datum));
  $("today-section").classList.toggle("hidden",!todayRoutes.length);
  $("today-cards").innerHTML=todayRoutes.map(r=>routeCardHTML(r)).join("");

  // Overdue
  const overdueRoutes=routes.filter(r=>isPast(r.datum)&&shopsByRoute(r).some(s=>s.status==="offen"));
  $("overdue-section").classList.toggle("hidden",!overdueRoutes.length);
  $("overdue-cards").innerHTML=overdueRoutes.map(r=>routeCardHTML(r)).join("");

  if(currentView==="list")renderList();
  if(currentView==="open")renderOpen();
}

function routeCardHTML(r){
  const rs=routeStatus(r);
  const wd=(WD[lang]&&WD[lang][r.wochentag])||r.wochentag||"";
  const overdue=isPast(r.datum)&&!rs.done;
  const isExp=expanded[r.id];
  const shopsInRoute=shopsByRoute(r);
  const team=[r.pv_mitglied_1,r.pv_mitglied_2,r.pv_mitglied_3].filter(Boolean).join(", ");

  let shopListHTML="";
  if(isExp){
    shopListHTML=`<div class="shops-list">${shopsInRoute.map(s=>shopItemHTML(s)).join("")}</div>`;
  }

  return `<div class="route-card${overdue?' overdue-border':''}" style="border-left:4px solid ${rs.color}">
    <div class="route-header" onclick="toggleExpand('${r.id}')">
      <div class="card-top">
        <div>
          <div class="card-region">${esc(r.gebiet)}</div>
          <div class="card-meta">
            ${wd} ${fmtDate(r.datum)} · ${r.anz_shops} Shops · ${r.anzahl_goodies} ${L.goodies}
            ${isToday(r.datum)?`<span class="today-badge">${L.today}</span>`:""}
            ${overdue?`<span class="overdue-badge">${L.overdue}</span>`:""}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="status-pill" style="background:${rs.color}">${rs.visited}/${rs.total}</span>
          <span class="expand-icon${isExp?' open':''}">▼</span>
        </div>
      </div>
      <div class="route-progress">
        <div class="route-progress-track"><div class="route-progress-fill" style="width:${rs.pct}%;background:${rs.color}"></div></div>
        <span class="route-progress-text">${rs.pct}%</span>
      </div>
    </div>
    <div class="card-detail"><span>${L.route}:</span> ${esc(r.reihenfolge||"")}</div>
    <div class="card-detail" style="margin-bottom:${isExp?0:8}px"><span>${L.team}:</span> ${esc(team)}</div>
    ${shopListHTML}
  </div>`;
}

function shopItemHTML(s){
  const colors={besucht:"#22c55e",nicht_besucht:"#ef4444",offen:"#f59e0b"};
  const col=colors[s.status]||"#f59e0b";
  const addr=[s.street,s.nr,s.zip,s.city].filter(Boolean).join(", ");

  let btns="";
  if(s.status!=="besucht") btns+=`<button class="btn-sm btn-sm-v" onclick="event.stopPropagation();doShopStatus('${s.id}','besucht')" title="${L.markVisited}">${L.markVisited}</button>`;
  if(s.status!=="nicht_besucht") btns+=`<button class="btn-sm btn-sm-nv" onclick="event.stopPropagation();openModal('${s.id}')" title="${L.markNotVisited}">${L.markNotVisited}</button>`;
  if(s.status!=="offen") btns+=`<button class="btn-sm btn-sm-r" onclick="event.stopPropagation();doShopStatus('${s.id}','offen')" title="${L.reset}">${L.reset}</button>`;

  return `<div class="shop-item" id="si-${s.id}">
    <div class="shop-status-dot" style="background:${col}"></div>
    <div class="shop-info">
      <div class="shop-name">${esc(s.shop_name)} <span style="color:#475569;font-weight:400;font-size:10px">${esc(s.lis||"")}</span></div>
      <div class="shop-addr">${esc(addr)}</div>
      <div class="shop-extra">${s.anzahl_ma||""} ${L.ma} · ${esc(s.emergency||"")}</div>
    </div>
    <div class="shop-actions">${btns}</div>
  </div>`;
}

// ========== EXPAND ==========
function toggleExpand(id){
  expanded[id]=!expanded[id];
  renderAll();
}

// ========== FILTERS ==========
function getMembers(){
  const m=new Set();
  routes.forEach(r=>[r.pv_mitglied_1,r.pv_mitglied_2,r.pv_mitglied_3].forEach(x=>{if(x&&x.trim()&&x!=="???")m.add(x.trim())}));
  return[...m].sort();
}
function buildFilters(){
  const regions=[...new Set(routes.map(r=>r.gebiet))].sort();
  const members=getMembers();
  $("f-region").innerHTML=`<option value="">${L.filterRegion}</option>`+regions.map(r=>`<option>${esc(r)}</option>`).join("");
  $("f-status").innerHTML=`<option value="">${L.filterStatus}</option><option value="done">${L.visited}</option><option value="open">${L.openStatus}</option><option value="nv">${L.notVisited}</option>`;
  $("f-member").innerHTML=`<option value="">${L.filterMember}</option>`+members.map(m=>`<option>${esc(m)}</option>`).join("");
}
function buildOpenFilters(){
  const openRoutes=routes.filter(r=>shopsByRoute(r).some(s=>s.status!=="besucht"));
  const regions=[...new Set(openRoutes.map(r=>r.gebiet))].sort();
  $("fo-region").innerHTML=`<option value="">${L.filterRegion}</option>`+regions.map(r=>`<option>${esc(r)}</option>`).join("");
}

function renderList(){
  let f=[...routes];
  const region=$("f-region").value,status=$("f-status").value,member=$("f-member").value;
  if(region) f=f.filter(r=>r.gebiet===region);
  if(status){
    if(status==="done") f=f.filter(r=>{const rs=routeStatus(r);return rs.done&&rs.total>0});
    if(status==="open") f=f.filter(r=>shopsByRoute(r).some(s=>s.status==="offen"));
    if(status==="nv") f=f.filter(r=>shopsByRoute(r).some(s=>s.status==="nicht_besucht"));
  }
  if(member) f=f.filter(r=>[r.pv_mitglied_1,r.pv_mitglied_2,r.pv_mitglied_3].some(m=>m&&m.includes(member)));
  $("list-cards").innerHTML=f.length?f.map(r=>routeCardHTML(r)).join(""):`<p class="empty">${L.noShops}</p>`;
}

function renderOpen(){
  let f=routes.filter(r=>shopsByRoute(r).some(s=>s.status!=="besucht"));
  const region=$("fo-region").value;
  if(region) f=f.filter(r=>r.gebiet===region);
  // Sort: overdue first
  f.sort((a,b)=>{const aO=isPast(a.datum)?0:1,bO=isPast(b.datum)?0:1;return aO-bO||(a.datum||"").localeCompare(b.datum||"")});
  // Auto-expand all in open view
  f.forEach(r=>expanded[r.id]=true);
  $("open-cards").innerHTML=f.length?f.map(r=>routeCardHTML(r)).join(""):`<p class="empty">${L.noShops}</p>`;
}

// ========== STATUS ==========
async function doShopStatus(id,status){
  const el=$("si-"+id);
  if(el)el.style.opacity="0.4";
  try{
    const payload=status==="offen"
      ?{status:"offen",besucht_von:null,besucht_am:null,kommentar:null}
      :{status,besucht_von:"User",besucht_am:new Date().toISOString()};
    await sbPatch("shop_details",id,payload);
    await loadAll();
  }catch(e){alert("Fehler: "+e.message);if(el)el.style.opacity="1"}
}

// ========== MODAL ==========
function openModal(id){
  event&&event.stopPropagation();
  modalShop=details.find(s=>s.id===id);
  if(!modalShop)return;
  $("modal-title").textContent=modalShop.shop_name+" — "+modalShop.gebiet;
  $("modal-comment").value="";
  $("modal-overlay").classList.remove("hidden");
  setTimeout(()=>$("modal-comment").focus(),100);
}
function closeModal(){modalShop=null;$("modal-overlay").classList.add("hidden")}
async function confirmNotVisited(){
  if(!modalShop)return;
  const cmt=$("modal-comment").value;
  try{
    await sbPatch("shop_details",modalShop.id,{status:"nicht_besucht",besucht_von:"User",besucht_am:new Date().toISOString(),kommentar:cmt||null});
    closeModal();await loadAll();
  }catch(e){alert("Fehler: "+e.message)}
}

// ========== INIT ==========
$("quiz-link").href=QUIZ_URL;
loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
